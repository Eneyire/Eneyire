<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Inter:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF6EE;
    --ink: #1A1A1A;
    --terracotta: #C9582B;
    --gold: #E8C468;
    --muted: #7A7368;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: 'Inter', sans-serif; background: #DDD8CC; }

  .frame { background: #DDD8CC; padding: 40px; display: flex; flex-direction: column; gap: 40px; }

  /* shared mark */
  .mark { display: block; }
  .mark .top { fill: var(--terracotta); }
  .mark .bottom { fill: none; stroke: var(--terracotta); stroke-width: 3; }
  .mark .crack { stroke: var(--gold); stroke-width: 2.5; stroke-linecap: round; }
  .mark.reversed .top { fill: var(--cream); }
  .mark.reversed .bottom { stroke: var(--cream); }

  /* Logo lockup blocks */
  .lockup-block { width: 900px; padding: 80px 70px; display: flex; flex-direction: column; gap: 28px; }
  .lockup-block.light { background: var(--cream); }
  .lockup-block.dark { background: var(--ink); }
  .lockup { display: flex; align-items: center; gap: 18px; }
  .lockup .mark { width: 64px; height: 64px; }
  .lockup .word { font-family: 'Fraunces', serif; font-weight: 700; font-size: 46px; letter-spacing: -0.01em; color: var(--ink); }
  .lockup-block.dark .word { color: var(--cream); }

  .scale-row { display: flex; align-items: center; gap: 36px; }
  .scale-row .mark-64 { width: 64px; height: 64px; }
  .scale-row .mark-40 { width: 40px; height: 40px; }
  .scale-row .mark-24 { width: 24px; height: 24px; }
  .scale-label { font-size: 12px; color: var(--muted); text-align: center; margin-top: 8px; }
  .scale-item { display: flex; flex-direction: column; align-items: center; }

  /* Banner */
  .banner {
    width: 1500px; height: 500px;
    background: var(--cream);
    position: relative;
    display: flex;
    align-items: center;
  }
  .banner-content {
    margin-left: 150px;
  }
  .banner-lockup { display: flex; align-items: center; gap: 20px; }
  .banner-lockup .mark { width: 58px; height: 58px; }
  .banner-lockup .word { font-family: 'Fraunces', serif; font-weight: 700; font-size: 48px; color: var(--ink); letter-spacing: -0.01em; }
  .banner-tagline {
    margin-top: 22px;
    margin-left: 78px;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 15px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
  }
</style>
</head>
<body>
<div class="frame">

  <!-- Primary lockup on cream -->
  <div class="lockup-block light" id="logo-primary">
    <div class="lockup">
      <svg class="mark" viewBox="0 0 100 100">
        <defs>
          <path id="seedA" d="M50 8 C 76 24 76 76 50 92 C 24 76 24 24 50 8 Z"/>
          <clipPath id="topA"><rect x="0" y="0" width="100" height="50"/></clipPath>
          <clipPath id="bottomA"><rect x="0" y="50" width="100" height="50"/></clipPath>
        </defs>
        <g transform="rotate(22 50 50)">
          <use href="#seedA" clip-path="url(#topA)" class="top"/>
          <use href="#seedA" clip-path="url(#bottomA)" class="bottom"/>
          <line x1="24" y1="50" x2="76" y2="50" class="crack"/>
        </g>
      </svg>
      <div class="word">Copy Sesame</div>
    </div>
  </div>

  <!-- Reversed lockup on ink -->
  <div class="lockup-block dark" id="logo-reversed">
    <div class="lockup">
      <svg class="mark reversed" viewBox="0 0 100 100">
        <defs>
          <path id="seedB" d="M50 8 C 76 24 76 76 50 92 C 24 76 24 24 50 8 Z"/>
          <clipPath id="topB"><rect x="0" y="0" width="100" height="50"/></clipPath>
          <clipPath id="bottomB"><rect x="0" y="50" width="100" height="50"/></clipPath>
        </defs>
        <g transform="rotate(22 50 50)">
          <use href="#seedB" clip-path="url(#topB)" class="top"/>
          <use href="#seedB" clip-path="url(#bottomB)" class="bottom"/>
          <line x1="24" y1="50" x2="76" y2="50" class="crack"/>
        </g>
      </svg>
      <div class="word">Copy Sesame</div>
    </div>
  </div>

  <!-- Mark at scale -->
  <div class="lockup-block light" id="logo-scale" style="flex-direction: row; align-items: center;">
    <div class="scale-row">
      <div class="scale-item">
        <svg class="mark mark-64" viewBox="0 0 100 100">
          <use href="#seedA" clip-path="url(#topA)" class="top"/>
          <use href="#seedA" clip-path="url(#bottomA)" class="bottom"/>
          <line x1="24" y1="50" x2="76" y2="50" class="crack"/>
        </svg>
        <div class="scale-label">64px</div>
      </div>
      <div class="scale-item">
        <svg class="mark mark-40" viewBox="0 0 100 100">
          <use href="#seedA" clip-path="url(#topA)" class="top"/>
          <use href="#seedA" clip-path="url(#bottomA)" class="bottom"/>
          <line x1="24" y1="50" x2="76" y2="50" class="crack"/>
        </svg>
        <div class="scale-label">40px</div>
      </div>
      <div class="scale-item">
        <svg class="mark mark-24" viewBox="0 0 100 100">
          <use href="#seedA" clip-path="url(#topA)" class="top"/>
          <use href="#seedA" clip-path="url(#bottomA)" class="bottom"/>
          <line x1="24" y1="50" x2="76" y2="50" class="crack"/>
        </svg>
        <div class="scale-label">24px</div>
      </div>
    </div>
  </div>

  <!-- Banner -->
  <div class="banner" id="banner">
    <div class="banner-content">
      <div class="banner-lockup">
        <svg class="mark" viewBox="0 0 100 100">
          <use href="#seedA" clip-path="url(#topA)" class="top"/>
          <use href="#seedA" clip-path="url(#bottomA)" class="bottom"/>
          <line x1="24" y1="50" x2="76" y2="50" class="crack"/>
        </svg>
        <div class="word">Copy Sesame</div>
      </div>
      <div class="banner-tagline">Email &amp; landing page copy that pays for itself</div>
    </div>
  </div>

</div>
</body>
</html>
