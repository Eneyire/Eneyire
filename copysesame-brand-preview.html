<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Inter:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF6EE;
    --ink: #1A1A1A;
    --muted: #7A7368;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: 'Inter', sans-serif; background: #DDD8CC; }

  .frame { background: #DDD8CC; padding: 40px; display: flex; flex-direction: column; gap: 40px; }

  /* Logo lockup blocks */
  .lockup-block { width: 900px; padding: 80px 70px; display: flex; flex-direction: column; gap: 28px; }
  .lockup-block.light { background: var(--cream); }
  .lockup-block.dark { background: var(--ink); }
  .word { font-family: 'Fraunces', serif; font-weight: 700; font-size: 46px; letter-spacing: -0.01em; color: var(--ink); }
  .lockup-block.dark .word { color: var(--cream); }

  /* Banner */
  .banner {
    width: 1500px; height: 500px;
    background: var(--cream);
    position: relative;
    display: flex;
    align-items: center;
  }
  .banner-content {
    margin-left: 150px;
  }
  .banner-content .word { font-size: 52px; }
  .banner-tagline {
    margin-top: 22px;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 15px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
  }
</style>
</head>
<body>
<div class="frame">

  <!-- Primary wordmark on cream -->
  <div class="lockup-block light" id="logo-primary">
    <div class="word">Copy Sesame</div>
  </div>

  <!-- Reversed wordmark on ink -->
  <div class="lockup-block dark" id="logo-reversed">
    <div class="word">Copy Sesame</div>
  </div>

  <!-- Banner -->
  <div class="banner" id="banner">
    <div class="banner-content">
      <div class="word">Copy Sesame</div>
      <div class="banner-tagline">Email &amp; landing page copy that pays for itself</div>
    </div>
  </div>

</div>
</body>
</html>
